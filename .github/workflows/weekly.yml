name: MOLIT Weekly Brief

# ⚠️ 주의: molit.go.kr이 GitHub Actions 러너(해외 IP)의 접속을 차단함
# (2026-07-11 확인: 연결 타임아웃). 정기 실행은 로컬 launchd가 담당하고
# (~/Library/LaunchAgents/com.rabbithabbit.molit-weekly.plist, 토 09:37 KST)
# 이 워크플로는 수동 재시도용으로만 남겨둠. README '자동화' 섹션 참고.
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: molit-weekly
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: Asia/Seoul
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: claude-sonnet-4-6
      KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
      KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
      KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
      # 조회수 기준·스캔 범위 조정은 여기서
      VIEW_THRESHOLD: '3000'
      SCAN_PAGES: '12'
      MAX_ITEMS_PER_RUN: '7'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run pipeline (scan → select → PDF → Claude → render → push)
        run: python pipeline/run.py --push

      - name: Upload intermediate JSONs as artifact (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-debug-${{ github.run_id }}
          path: out/
          if-no-files-found: ignore
