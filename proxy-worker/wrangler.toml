name = "molit-proxy"
main = "worker.js"
compatibility_date = "2026-07-01"

# 정시 발행: 토 09:37 KST (= 00:37 UTC SAT) 에 GitHub 워크플로 디스패치
[triggers]
crons = ["37 0 * * SAT"]

# 배포: cd proxy-worker && npx wrangler deploy
# 시크릿: npx wrangler secret put PROXY_TOKEN   (프록시 인증)
#         npx wrangler secret put GH_TOKEN      (GitHub fine-grained PAT, Actions R/W)
